<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#091321">
    <title>App Sổ Vàng Quỹ Khuyến Học - Trường THCS & THPT Cây Dương</title>
    
    <!-- Load Tailwind CSS & Fonts & Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;800&family=Montserrat:ital,wght@0,400;0,500;0,600;1,400&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            /* Hệ màu Royal Academic (Hải quân & Vàng Gold) */
            --navy-dark: #091321;
            --navy-main: #112A46;
            --navy-light: #1C4066;
            --gold-dark: #997A15;
            --gold-main: #D4AF37;
            --gold-light: #F3E5AB;
            --paper-bg: #FCFBF8;
            --paper-darker: #F0EAE1;
            --text-dark: #2C3E50;
            --text-gray: #556B8D;
            /* Đường dẫn lấy logo từ ổ D trên máy tính */
            --logo-url: url('file:///D:/Logo%20Truong%20THCS-%20THPT%20Cay%20Duong.jpg');
        }

        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #1a2a3a 0%, #091321 100%);
            font-family: 'Montserrat', sans-serif;
            overflow: hidden; /* Ngăn scroll mặc định để giống App */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: var(--text-dark);
        }

        /* Vùng chứa Sách */
        .app-workspace {
            position: relative;
            width: 100%;
            height: calc(100vh - 80px); /* Chừa chỗ cho toolbar bottom */
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            box-sizing: border-box;
        }

        /* ĐỊNH DẠNG KHUÔN GIẤY CHUẨN A4 - ĐÁP ỨNG MỌI MÀN HÌNH */
        .book-container {
            position: relative;
            
            /* 1. Luôn giữ đúng tỷ lệ A4 Khổ dọc (210:297) */
            aspect-ratio: 210 / 297;
            
            /* 2. Thuật toán tự động tính toán kích thước tối đa để không bao giờ tràn màn hình.
                  - Nếu màn hình dọc (Điện thoại): Lấy chiều rộng 100%.
                  - Nếu màn hình ngang (Máy tính, Tivi): Lấy chiều cao tối đa trừ đi không gian Toolbar, 
                    sau đó nhân với tỷ lệ để ra chiều rộng tương ứng. */
            width: min(100%, calc((100vh - 100px) * (210 / 297)));
            
            /* Giới hạn kích thước vật lý trên Tivi khổng lồ để chữ không bị kéo giãn quá mức */
            max-width: 900px;
            height: auto;
            
            background: var(--paper-bg);
            box-shadow: 
                -5px 0 25px rgba(0,0,0,0.6),
                0 30px 60px -15px rgba(0, 0, 0, 0.8);
            border-radius: 4px 12px 12px 4px;
            overflow: hidden;
            perspective: 2000px;
        }

        /* Gáy sách */
        .book-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; 
            width: max(20px, 4%); /* Tự co giãn theo kích thước sách */
            height: 100%;
            background: linear-gradient(to right, 
                rgba(0,0,0,0.3) 0%, rgba(255,255,255,0.1) 15%, 
                rgba(0,0,0,0.05) 30%, rgba(255,255,255,0.2) 40%, 
                rgba(0,0,0,0.1) 50%, rgba(255,255,255,0) 100%);
            z-index: 50; pointer-events: none;
            border-left: 2px solid rgba(0,0,0,0.2);
        }

        /* Cấu hình từng trang lật */
        .page {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            box-sizing: border-box;
            background-color: var(--paper-bg);
            /* Texture vân giấy mỹ thuật */
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
            opacity: 0; visibility: hidden;
            transform-origin: left center;
            transform: rotateY(-20deg) scale(0.95) translateX(20px);
            transition: all 0.7s cubic-bezier(0.645, 0.045, 0.355, 1);
            display: flex; flex-direction: column; z-index: 1;
        }

        .page.active {
            opacity: 1; visibility: visible;
            transform: rotateY(0deg) scale(1) translateX(0);
            z-index: 10;
            box-shadow: -10px 0 20px rgba(0,0,0,0.1);
        }

        .page.prev-out {
            transform: rotateY(20deg) scale(0.95) translateX(-20px);
        }

        /* Header của trang nội dung */
        .page-header {
            display: flex; align-items: center; justify-content: space-between;
            /* Dùng % để lề tự động co giãn theo kích thước thiết bị */
            padding: 5% 7% 3% 9%; 
            border-bottom: 2px solid var(--gold-light);
            margin-bottom: 2%; position: relative; z-index: 2;
        }

        .header-logo {
            width: max(35px, 8%); 
            aspect-ratio: 1/1;
            background-image: var(--logo-url);
            background-size: contain; background-repeat: no-repeat; background-position: center;
        }

        .header-text { text-align: right; flex-grow: 1; }
        .header-title {
            font-family: 'Cinzel', serif; font-size: 1.1rem; font-weight: 700;
            color: var(--navy-main); letter-spacing: 1px; margin: 0;
        }
        .header-subtitle {
            font-size: 0.8rem; color: var(--gold-dark); text-transform: uppercase;
            letter-spacing: 0.5px; margin-top: 3px;
        }

        /* Watermark Nền */
        .watermark {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 75%; height: 75%;
            background-image: var(--logo-url); background-size: contain;
            background-repeat: no-repeat; background-position: center;
            opacity: 0.05; z-index: 0; filter: grayscale(100%);
        }

        /* Lớp nội dung chi tiết */
        .content-layer {
            position: relative; z-index: 2; flex-grow: 1;
            padding: 0 7% 7% 9%; display: flex; flex-direction: column;
            overflow-y: auto;
        }
        .content-layer::-webkit-scrollbar { width: 4px; }
        .content-layer::-webkit-scrollbar-thumb { background: var(--gold-light); border-radius: 10px; }

        /* Trang Bìa */
        .page-cover {
            background: linear-gradient(145deg, var(--navy-dark), var(--navy-main));
            padding: 8%; align-items: center; justify-content: center; text-align: center;
            background-image: radial-gradient(circle at 50% 30%, rgba(212, 175, 55, 0.15) 0%, transparent 60%);
        }
        .cover-border {
            position: absolute; top: 4%; left: 6%; right: 4%; bottom: 4%;
            border: 2px solid var(--gold-main); outline: 1px solid var(--gold-main);
            outline-offset: 6px; z-index: 1; pointer-events: none;
        }
        .cover-border::before, .cover-border::after {
            content: ''; position: absolute; width: 25px; height: 25px; border: 2px solid var(--gold-light);
        }
        .cover-border::before { top: -6px; left: -6px; border-right: none; border-bottom: none; }
        .cover-border::after { bottom: -6px; right: -6px; border-left: none; border-top: none; }

        .cover-header-text {
            font-size: 1rem; font-weight: 600; color: var(--paper-bg); letter-spacing: 2px;
            text-transform: uppercase; margin-bottom: 8%; position: relative; z-index: 2;
        }
        .cover-logo-wrapper {
            width: 35%; max-width: 180px; min-width: 110px; aspect-ratio: 1/1;
            background-color: white; border-radius: 50%;
            padding: 2%; box-shadow: 0 0 0 4px var(--gold-main), 0 15px 35px rgba(0,0,0,0.5);
            margin: 0 auto 8%; position: relative; z-index: 2;
        }
        .cover-logo-img {
            width: 100%; height: 100%; background-image: var(--logo-url);
            background-size: contain; background-repeat: no-repeat; background-position: center;
        }
        .cover-title {
            font-family: 'Cinzel', serif; font-size: 2.8rem; font-weight: 800; color: var(--gold-main);
            margin: 0 0 3% 0; text-transform: uppercase; line-height: 1.2;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5); position: relative; z-index: 2;
            background: linear-gradient(to bottom, #FFF4D2, #D4AF37, #997A15);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .cover-subtitle {
            font-family: 'Montserrat', sans-serif; font-size: 1.2rem; color: var(--gold-light);
            font-weight: 500; letter-spacing: 3px; margin-bottom: 10%; position: relative; z-index: 2;
        }
        .cover-footer-text {
            font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 700;
            color: var(--paper-bg); margin-top: auto; line-height: 1.6; position: relative; z-index: 2;
        }

        /* Thẻ MTQ */
        .donor-heading {
            font-family: 'Playfair Display', serif; color: var(--navy-main); text-align: center;
            font-size: 1.8rem; font-weight: 700; margin: 2% 0 6%; text-transform: uppercase; position: relative;
        }
        .donor-heading::after {
            content: ''; display: block; width: 50px; height: 3px;
            background: var(--gold-main); margin: 15px auto 0; border-radius: 2px;
        }
        .donor-card {
            background: #ffffff; border-radius: 12px; padding: 6%;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08); margin-bottom: 6%;
            border: 1px solid rgba(212, 175, 55, 0.3); position: relative;
        }
        .donor-card::before {
            content: ''; position: absolute; top: 0; left: 20px; right: 20px; height: 4px;
            background: linear-gradient(90deg, transparent, var(--gold-main), transparent);
        }
        .donor-name {
            font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--gold-dark);
            text-align: center; margin-bottom: 6%; text-transform: uppercase; font-weight: 700;
        }
        .info-grid { display: grid; gap: 12px; }
        .info-row {
            display: flex; justify-content: space-between; align-items: center;
            padding-bottom: 8px; border-bottom: 1px dashed var(--paper-darker);
        }
        .info-label { font-weight: 500; color: var(--text-gray); font-size: 0.9rem; text-transform: uppercase; }
        .info-value { color: var(--navy-dark); font-weight: 600; font-size: 1rem; text-align: right; }
        .info-value.amount { color: #C0392B; font-size: 1.3rem; font-weight: 700; font-family: 'Montserrat', sans-serif; }
        .donor-message {
            font-family: 'Playfair Display', serif; font-style: italic; text-align: center;
            line-height: 1.7; color: var(--navy-light); font-size: 1.05rem; padding: 0 3%; position: relative;
        }

        /* Thư cảm ơn */
        .page-letter .content-layer { justify-content: center; }
        .letter-title {
            font-family: 'Cinzel', serif; color: var(--navy-main); font-size: 2rem;
            font-weight: 700; margin: 0 0 5%; text-align: center; border-bottom: 2px solid var(--gold-main); padding-bottom: 3%;
        }
        .letter-content { font-size: 1rem; line-height: 1.8; text-align: justify; margin-bottom: 6%; }
        .letter-content p { margin-bottom: 12px; text-indent: 30px; }

        /* Lời mở đầu */
        .page-intro .content-layer { justify-content: flex-start; padding-top: 5%;}
        .intro-title {
            font-family: 'Cinzel', serif; color: var(--navy-main); font-size: 1.8rem;
            font-weight: 800; margin: 0 0 6%; text-align: center; border-bottom: 2px solid var(--gold-main); padding-bottom: 3%; line-height: 1.4;
        }
        .intro-content { 
            font-size: 1rem; line-height: 1.8; text-align: justify; color: var(--navy-dark);
            font-family: 'Montserrat', sans-serif;
        }
        .intro-content p { margin-bottom: 15px; text-indent: 30px; }
        .intro-highlight { font-family: 'Playfair Display', serif; font-size: 1.1rem; font-weight: 600; color: var(--navy-main); text-align: center; margin: 6% 0; font-style: italic;}

        /* App Toolbar (Bottom) */
        .app-toolbar {
            width: 100%; height: 80px; background: rgba(9, 19, 33, 0.95);
            backdrop-filter: blur(10px); border-top: 1px solid rgba(255,255,255,0.1);
            display: flex; justify-content: space-around; align-items: center;
            padding: 0 20px; box-sizing: border-box; z-index: 100;
        }
        .toolbar-btn {
            display: flex; flex-direction: column; align-items: center; gap: 6px;
            color: #A0B3C6; background: none; border: none; font-size: 11px; font-family: 'Montserrat', sans-serif;
            cursor: pointer; transition: all 0.2s; min-width: 60px;
        }
        .toolbar-btn i { font-size: 22px; margin-bottom: 2px; }
        .toolbar-btn:hover, .toolbar-btn.active { color: var(--gold-main); transform: translateY(-2px); }
        .toolbar-btn:disabled { color: #334; cursor: not-allowed; transform: none; }

        .nav-group { display: flex; align-items: center; gap: 15px; background: rgba(255,255,255,0.05); padding: 5px 15px; border-radius: 30px;}
        .page-counter { font-family: 'Playfair Display', serif; font-size: 16px; color: white; font-weight: bold; width: 60px; text-align: center;}

        /* Modals (Menu & Search) */
        .app-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px);
            z-index: 200; display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: opacity 0.3s; padding: 20px;
        }
        .app-modal.open { opacity: 1; pointer-events: all; }
        .modal-content {
            background: var(--paper-bg); width: 100%; max-width: 450px; max-height: 80vh;
            border-radius: 12px; display: flex; flex-direction: column; overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); transform: translateY(20px); transition: transform 0.3s;
        }
        .
